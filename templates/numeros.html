{% extends "base.html" %}

{% block content %}
<div class="card text-center">
    <div class="icon-header">🎯</div>
    <h2>Escolha seus números</h2>
    <p class="subtitle">Selecione os números desejados para continuar</p>

    <form method="post">
        <div class="numbers-grid">
            {% for i in range(1, 26) %}
            {% if i in ocupados %}
            <label class="number-box disabled" title="Número já escolhido">
                <input type="checkbox" disabled>
                <span>❌</span>
                <span class="num-text">{{i}}</span>
            </label>
            {% else %}
            <label class="number-box available" tabindex="0">
                <input type="checkbox" name="numeros" value="{{i}}">
                <span class="num-text">{{i}}</span>
            </label>
            {% endif %}
            {% endfor %}
        </div>

        <div class="actions mt-4">
            <button type="submit" class="btn btn-primary btn-block btn-lg">Ir para o Pagamento 💰</button>
            <!-- <a href="/" class="btn btn-outline btn-block mt-2">Voltar ao início</a> -->
        </div>
    </form>
</div>
{% endblock %}
