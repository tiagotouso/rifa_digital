{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="text-center">
        <span class="icon-header">🔐</span>
        <h2>Acesso Restrito</h2>
        <p class="subtitle">Área do Administrador</p>
    </div>

    {% if erro %}
    <div class="mb-4 text-center text-danger" style="background-color: #FEE2E2; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #FECACA;">
        {{ erro }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}" class="form-layout">
        <div class="form-group">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block mt-2">
            Entrar
        </button>
    </form>
    <div class="text-center mt-4">
        <a href="{{ url_for('index') }}" class="btn btn-outline btn-block" style="text-decoration: none;">Voltar ao Início</a>
    </div>
</div>
{% endblock %}
